name: CI

on:
  pull_request:
    branches:
      - main
      - develop

jobs:
  lint-and-build:
    name: Lint & Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint

      - name: Build project
        run: npm run build

      - name: Build Summary
        run: |
          echo "### CI Checks Passed! ✅" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Lint passed" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Build succeeded" >> $GITHUB_STEP_SUMMARY

      # Discord notification on success
      - name: Discord Notification (Success)
        if: success()
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK_URL }}
          status: ${{ job.status }}
          title: "CI - Pull Request"
          description: |
            ✅ All checks passed!
            **PR:** ${{ github.event.pull_request.title }}
            **Branch:** ${{ github.head_ref }} → ${{ github.base_ref }}
            **Author:** ${{ github.actor }}
          color: 0x00FF00

      # Discord notification on failure
      - name: Discord Notification (Failure)
        if: failure()
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK_URL }}
          status: ${{ job.status }}
          title: "CI - Pull Request"
          description: |
            ❌ Checks failed!
            **PR:** ${{ github.event.pull_request.title }}
            **Branch:** ${{ github.head_ref }} → ${{ github.base_ref }}
            **Author:** ${{ github.actor }}
          color: 0xFF0000
